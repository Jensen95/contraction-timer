version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      svelte-ecosystem:
        patterns:
          - 'svelte'
          - '@sveltejs/*'
      vite-ecosystem:
        patterns:
          - 'vite'
          - 'vite-*'
      workbox:
        patterns:
          - 'workbox-*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
      dev-tools:
        dependency-type: development
        patterns:
          - 'oxlint'
          - 'prettier*'
          - 'typescript'
          - 'svelte-check'
          - '@types/*'
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - dependencies
      - github-actions
