server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to base path
    location = / {
        return 301 /contraction-timer/;
    }

    # Service worker — never cache, correct scope header
    location = /contraction-timer/sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/contraction-timer/" always;
        try_files $uri =404;
    }

    # Web app manifest
    location = /contraction-timer/manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        types { }
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Content-hashed assets — immutable cache
    location ~* ^/contraction-timer/assets/.*\.(js|css|woff2?|svg|png|jpg|webp|avif)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — all paths under base return index.html
    location /contraction-timer/ {
        try_files $uri $uri/ /contraction-timer/index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;
}
